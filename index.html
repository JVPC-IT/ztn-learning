<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZTN Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#2db8a8;--teal-dark:#1e9088;--teal-light:#e8f8f6;--teal-mid:#a8e6df;
  --ink:#1a2332;--ink2:#3d4f63;--ink3:#7a8fa6;
  --bg:#dde8ef;--surface:#ffffff;--notice-bg:#efefef;
}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;padding:2rem 0 3rem;overflow-x:hidden;}
.app{max-width:100%;overflow:hidden;}
.top-bar{text-align:center;margin-bottom:2rem;padding:0 1rem;}
.top-title{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px;}
.top-sub{font-size:12px;color:var(--ink3);}
.cats{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:0 1rem;margin-bottom:1.5rem;}
.cat{padding:4px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid rgba(45,184,168,0.3);background:rgba(255,255,255,0.6);color:var(--ink3);transition:all 0.2s;letter-spacing:0.03em;text-transform:uppercase;}
.cat:hover{border-color:var(--teal);color:var(--teal-dark);}
.cat.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.counter{text-align:center;font-size:12px;color:var(--ink3);font-weight:600;margin-bottom:1.25rem;letter-spacing:0.05em;}
.carousel-wrap{position:relative;height:420px;display:flex;align-items:center;justify-content:center;}
.card-slot{position:absolute;transition:all 0.4s cubic-bezier(0.4,0.2,0.2,1);cursor:pointer;}
.card-slot.pos-center{transform:translateX(0) scale(1);z-index:10;filter:none;}
.card-slot.pos-left{transform:translateX(-185px) scale(0.82);z-index:5;filter:blur(2.5px);pointer-events:none;}
.card-slot.pos-right{transform:translateX(185px) scale(0.82);z-index:5;filter:blur(2.5px);pointer-events:none;}
.card-slot.pos-far-left{transform:translateX(-310px) scale(0.68);z-index:2;filter:blur(4px);pointer-events:none;}
.card-slot.pos-far-right{transform:translateX(310px) scale(0.68);z-index:2;filter:blur(4px);pointer-events:none;}
.card-slot.pos-hidden{transform:translateX(0) scale(0.5);z-index:0;opacity:0;pointer-events:none;}
.card-inner{width:260px;height:360px;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(0.4,0.2,0.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:22px;overflow:hidden;}
.card-front{background:var(--surface);border:2px solid var(--teal-mid);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1.25rem;text-align:center;}
.card-front .cat-pill{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--teal-dark);background:var(--teal-light);padding:3px 10px;border-radius:20px;margin-bottom:1.1rem;}
.card-front .icon-wrap{width:72px;height:72px;background:var(--teal-light);border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:1.1rem;}
.card-front .icon-wrap svg{width:38px;height:38px;}
.card-front .term{font-size:17px;font-weight:800;color:var(--ink);line-height:1.25;margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.02em;}
.card-front .term-sub{font-size:11px;color:var(--ink3);font-weight:500;margin-bottom:1.2rem;}
.card-front .flip-hint{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3);font-weight:500;}
.card-back{background:var(--surface);transform:rotateY(180deg);display:flex;flex-direction:column;}
.back-header{background:var(--teal);padding:14px 16px 12px;}
.back-header .term-back{font-size:13px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:0.04em;line-height:1.3;}
.back-body{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:10px;overflow:hidden;}
.back-row{display:flex;gap:10px;align-items:flex-start;}
.back-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.back-icon svg{width:14px;height:14px;}
.bi-meaning{background:#e8f8f6;}
.bi-matters{background:#fef3e2;}
.back-text{flex:1;}
.back-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;}
.lbl-meaning{color:var(--teal-dark);}
.lbl-matters{color:#b45309;}
.lbl-notice{color:#555;}
.back-desc{font-size:11.5px;color:var(--ink2);line-height:1.55;font-weight:400;}
.back-notice-row{background:var(--notice-bg);border-radius:10px;padding:9px 12px;display:flex;gap:9px;align-items:flex-start;}
.nav-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:1.5rem;padding:0 1rem;}
.nav-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(45,184,168,0.35);background:rgba(255,255,255,0.7);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--teal-dark);}
.nav-btn:hover{background:var(--teal);border-color:var(--teal);}
.nav-btn:hover svg{stroke:#fff;}
.nav-btn:disabled{opacity:0.25;cursor:default;}
.nav-btn svg{width:18px;height:18px;stroke:var(--teal-dark);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s;}
.flip-btn{padding:10px 28px;border-radius:24px;background:var(--teal);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.04em;transition:all 0.2s;font-family:'Inter',sans-serif;}
.flip-btn:hover{background:var(--teal-dark);}
.prog-row{display:flex;align-items:center;gap:10px;padding:0 2rem;margin-top:1.25rem;}
.prog-bar{flex:1;height:3px;background:rgba(45,184,168,0.2);border-radius:3px;}
.prog-fill{height:100%;background:var(--teal);border-radius:3px;transition:width 0.4s;}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="top-title">ZTN Flashcards</div>
    <div class="top-sub">Click a card · flip to reveal · track your progress</div>
  </div>
  <div class="cats" id="cats"></div>
  <div class="counter" id="counter"></div>
  <div class="carousel-wrap" id="carousel"></div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="move(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <button class="flip-btn" onclick="flipCurrent()">Flip card</button>
    <button class="nav-btn" id="btn-next" onclick="move(1)">
      <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
    </button>
  </div>
  <div class="prog-row">
    <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  </div>
</div>

<script>
const ICONS={
  "Basics":`<svg viewBox="0 0 38 38" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="19" cy="19" r="14"/><path d="M19 12v7l4 4"/><circle cx="19" cy="19" r="3" fill="#2db8a8" stroke="none"/></svg>`,
  "Identity":`<svg viewBox="0 0 38 38" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="19" cy="14" r="5"/><path d="M9 30c0-5.5 4.5-10 10-10s10 4.5 10 10"/><rect x="6" y="6" width="26" height="26" rx="6"/></svg>`,
  "Tenants":`<svg viewBox="0 0 38 38" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10" width="12" height="18" rx="3"/><rect x="21" y="10" width="12" height="18" rx="3"/><path d="M17 19h4"/></svg>`,
  "Devices":`<svg viewBox="0 0 38 38" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="8" width="24" height="17" rx="3"/><path d="M14 29h10M19 25v4"/></svg>`,
  "Network":`<svg viewBox="0 0 38 38" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="19" cy="19" r="12"/><path d="M19 7c-4 4-4 20 0 24M19 7c4 4 4 20 0 24M7 19h24"/></svg>`,
  "Security":`<svg viewBox="0 0 38 38" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 5l12 5v9c0 7-5 12-12 14C12 31 7 26 7 19V10z"/><path d="M14 19l3 3 7-7"/></svg>`,
  "Certificates":`<svg viewBox="0 0 38 38" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="8" width="26" height="18" rx="3"/><circle cx="19" cy="17" r="4"/><path d="M15 30l4-4 4 4"/></svg>`,
  "Operations":`<svg viewBox="0 0 38 38" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 8v4M19 26v4M8 19H4M34 19h-4"/><circle cx="19" cy="19" r="7"/><path d="M11 11l3 3M24 24l3 3M11 27l3-3M24 14l3-3"/></svg>`,
};
const ICON_MEANING=`<svg viewBox="0 0 14 14" fill="none" stroke="#2db8a8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="5" r="3"/><path d="M4 11c0-1.7 1.3-3 3-3s3 1.3 3 3"/></svg>`;
const ICON_MATTERS=`<svg viewBox="0 0 14 14" fill="none" stroke="#b45309" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5.5"/><path d="M7 4v3.5M7 10h.01"/></svg>`;
const ICON_NOTICE=`<svg viewBox="0 0 14 14" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5.5"/><path d="M5 5.5c0-1.1.9-2 2-2s2 .9 2 2c0 1-1 1.5-2 2v.5M7 10.5h.01"/></svg>`;

const ALL=[
  {term:"Zero Trust",sub:"Core concept",cat:"Basics",meaning:"A security model that trusts no one by default — every access request is verified regardless of location.",matters:"It explains why checks happen more often and why being on the network is no longer enough.",notice:"You may be asked to sign in more carefully or use a managed PC to access company resources."},
  {term:"Never Trust, Always Verify",sub:"Core principle",cat:"Basics",meaning:"Every access request must be checked — not assumed safe — every single time.",matters:"It is the reason behind login prompts, device checks, and access restrictions.",notice:"Access can be allowed, limited, or blocked depending on real-time checks."},
  {term:"Least Privilege",sub:"Access concept",cat:"Basics",meaning:"Giving only the minimum access needed for your job — not broad access just in case.",matters:"Reduces damage if an account is compromised and prevents accidental data exposure.",notice:"You may need to request access to certain folders rather than having it automatically."},
  {term:"Continuous Verification",sub:"Security behavior",cat:"Basics",meaning:"Security checks happen continuously — not only once at login.",matters:"Risk can change over time through device updates, unusual activity, or location changes.",notice:"Something that worked yesterday may behave differently today if risk signals changed."},
  {term:"MFA",sub:"Multi-Factor Authentication",cat:"Identity",meaning:"A login method requiring more than a password — such as phone confirmation or a one-time code.",matters:"One of the strongest protections against account takeover attacks.",notice:"You may be asked to approve a sign-in on your phone or enter a code."},
  {term:"Conditional Access",sub:"Access control rule",cat:"Identity",meaning:"A rule system that decides whether to allow, limit, or block access based on identity, device, and context.",matters:"Protects company data without blocking normal everyday work unnecessarily.",notice:"You might be blocked if your device is non-compliant or a sign-in looks unusual."},
  {term:"SSO",sub:"Single Sign-On",cat:"Identity",meaning:"Sign in once and access multiple company services without repeating the full login each time.",matters:"Reduces friction while keeping all security controls in place.",notice:"You may notice fewer repeated login prompts when everything is working normally."},
  {term:"Authentication",sub:"Proving who you are",cat:"Identity",meaning:"The process of proving you are really you — signing in with verified credentials.",matters:"Prevents stolen passwords alone from being enough to access company data.",notice:"You may need to confirm sign-in using additional verification steps."},
  {term:"Authorization",sub:"What you can access",cat:"Identity",meaning:"What you are permitted to do after signing in — even valid users may not access everything.",matters:"Ensures data access is tied to job role, not just a successful login.",notice:"You may see 'access denied' even when your password is correct."},
  {term:"Dual-Tenant Usage",sub:"Two accounts by design",cat:"Tenants",meaning:"Using two separate accounts — one for security enforcement (NOEXG), one for daily business work (JVPC).",matters:"Keeps security enforcement strong without disrupting your everyday collaboration tools.",notice:"You may sign into Windows with one account and use Teams or email with another."},
  {term:"NOEXG Tenant",sub:"@noexg.com",cat:"Tenants",meaning:"The security tenant used for Windows sign-in and device compliance enforcement.",matters:"This is how security controls and policies are consistently applied to your PC.",notice:"You may see this account at PC sign-in and in security-related prompts."},
  {term:"JVPC Tenant",sub:"@jvpc.com.vn",cat:"Tenants",meaning:"The business tenant used for email, Teams, SharePoint, and all daily collaboration.",matters:"This is where your day-to-day work and business data live.",notice:"This is the account you use inside Outlook, Teams, and SharePoint."},
  {term:"Responsibility Boundary",sub:"Who controls what",cat:"Tenants",meaning:"A clear separation: Security Team controls NOEXG, JVPC IT controls business tools.",matters:"Prevents business changes from weakening security, and security changes from breaking work tools.",notice:"Knowing which side the issue is on helps route it to the right team faster."},
  {term:"ZTN PC",sub:"Zero Trust Network PC",cat:"Devices",meaning:"A company-managed PC configured to operate within the Zero Trust security environment.",matters:"Using a managed device is a key way to keep company data safe while working flexibly.",notice:"Some settings are managed automatically and cannot be changed freely."},
  {term:"Device Compliance",sub:"Meeting security standards",cat:"Devices",meaning:"Whether your device meets required conditions — updates, security settings, and endpoint protection.",matters:"Non-compliant devices may be restricted to protect company systems and data.",notice:"Access may be limited until your device returns to a compliant state."},
  {term:"Microsoft Intune",sub:"Device management system",cat:"Devices",meaning:"The platform used to manage device settings and distribute apps on managed PCs.",matters:"Keeps all devices secure and consistently configured across users and locations.",notice:"You may be directed to install apps via the Company Portal rather than downloading freely."},
  {term:"Certificate",sub:"Digital trust ID",cat:"Certificates",meaning:"A digital credential that proves trust for a user or device — it has an expiry date.",matters:"Used to establish trusted communication and verify that your device is still authorized.",notice:"If a certificate expires, access to some resources may fail until it is renewed."},
  {term:"Certificate Expiration",sub:"Trust has a time limit",cat:"Certificates",meaning:"Certificates do not last forever — they expire and must be renewed periodically.",matters:"Expired certificates can restrict access until the system renews them automatically.",notice:"Something may stop working temporarily — this is expected behavior, not a malfunction."},
  {term:"GlobalProtect",sub:"VPN client",cat:"Network",meaning:"The VPN software that routes your traffic securely through Zero Trust security services.",matters:"Ensures that all outgoing traffic passes through the correct inspection and policy controls.",notice:"You may see it running in the background when accessing company resources remotely."},
  {term:"Latency",sub:"Why things feel slow",cat:"Network",meaning:"Delay in data travel — caused by longer routing paths and security inspection checkpoints.",matters:"Longer routes and inspection increase latency, which can feel like slowness during normal work.",notice:"Teams calls or file loads may feel slower — this is often normal security processing."},
  {term:"Prisma Access",sub:"Cloud security gateway",cat:"Network",meaning:"A cloud service that handles VPN connectivity and applies web access security policies.",matters:"Protects users wherever they work by inspecting all traffic through security controls.",notice:"Network paths may change because all traffic is routed through inspection services."},
  {term:"EDR",sub:"Endpoint Detection & Response",cat:"Security",meaning:"Security software that monitors your device for suspicious behavior and responds to threats.",matters:"Reduces risk from malware, ransomware, and other endpoint-based attacks.",notice:"Security scanning can sometimes occur quietly in the background."},
  {term:"Cortex XDR",sub:"JVPC's EDR solution",cat:"Security",meaning:"The endpoint detection and response tool used by JVPC for monitoring and threat investigation.",matters:"Helps IT detect threats early and investigate abnormal events on managed devices.",notice:"You may hear about it when IT is investigating a security event on your device."},
  {term:"Logging",sub:"Recording what happens",cat:"Security",meaning:"Automatic recording of important events — sign-ins, access attempts, device activity.",matters:"Logs help IT troubleshoot issues and investigate security incidents effectively.",notice:"Providing exact time and location when reporting issues helps IT match the right logs."},
  {term:"Symptom vs Root Cause",sub:"Describe, don't just report",cat:"Operations",meaning:"A symptom is what you observe (slow, error). A root cause is the actual underlying reason.",matters:"Sharing context helps IT find the root cause faster instead of guessing.",notice:"'Teams is slow at home at 9am' is far more useful to IT than just 'Teams is slow'."},
  {term:"Evidence",sub:"Context that helps IT",cat:"Operations",meaning:"Facts that describe a problem: error message, time, location, app, and what you were doing.",matters:"Evidence lets IT identify the right logs and reproduce the issue accurately.",notice:"Providing the exact time and affected app is usually the most useful piece of information."},
  {term:"Ticket",sub:"Tracked problem record",cat:"Operations",meaning:"A formal record of a reported issue — assigned, investigated, and closed with a tracked status.",matters:"Prevents issues from being lost and helps IT identify recurring patterns over time.",notice:"You may receive a ticket number and status updates after reporting an issue."},
  {term:"Knowledge Base",sub:"Shared solutions library",cat:"Operations",meaning:"A shared repository of fixes, FAQs, and lessons learned from resolved issues.",matters:"Helps staff solve common problems faster and reduces repeated questions to IT.",notice:"You may be directed to a KB article rather than receiving a repeated individual explanation."},
  {term:"Continuous Improvement",sub:"Learning from incidents",cat:"Operations",meaning:"A cycle: report → analyze → share → prevent. Every incident becomes input for improvement.",matters:"Turns today's problem into tomorrow's prevention — the system gets smarter over time.",notice:"You may see updated guidance or procedures after recurring issues are resolved."},
];

let deck=[],cur=0,activeCat="All",flippedSet=new Set();
function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}
function buildDeck(){
  deck=shuffle(activeCat==="All"?ALL:ALL.filter(c=>c.cat===activeCat));
  cur=0;flippedSet=new Set();render();
}
function getPos(i){
  const d=i-cur;
  if(d===0)return'pos-center';
  if(d===-1)return'pos-left';
  if(d===1)return'pos-right';
  if(d===-2)return'pos-far-left';
  if(d===2)return'pos-far-right';
  return'pos-hidden';
}
function makeCard(card,i){
  const icon=ICONS[card.cat]||ICONS["Basics"];
  const isFlipped=flippedSet.has(i);
  return`<div class="card-slot ${getPos(i)}" id="slot-${i}" onclick="clickSlot(${i})">
    <div class="card-inner${isFlipped?' flipped':''}" id="inner-${i}">
      <div class="card-face card-front">
        <div class="cat-pill">${card.cat}</div>
        <div class="icon-wrap">${icon}</div>
        <div class="term">${card.term}</div>
        <div class="term-sub">${card.sub}</div>
        <div style="flex:1"></div>
        <div class="flip-hint">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#2db8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7a5 5 0 0 1 9-2M12 7a5 5 0 0 1-9 2"/><path d="M10 5l1-1.5.5 2"/><path d="M4 9l-1 1.5-.5-2"/></svg>
          Tap to flip
        </div>
      </div>
      <div class="card-face card-back">
        <div class="back-header"><div class="term-back">${card.term}</div></div>
        <div class="back-body">
          <div class="back-row">
            <div class="back-icon bi-meaning">${ICON_MEANING}</div>
            <div class="back-text">
              <div class="back-label lbl-meaning">Meaning</div>
              <div class="back-desc">${card.meaning}</div>
            </div>
          </div>
          <div class="back-row">
            <div class="back-icon bi-matters">${ICON_MATTERS}</div>
            <div class="back-text">
              <div class="back-label lbl-matters">Why it matters</div>
              <div class="back-desc">${card.matters}</div>
            </div>
          </div>
          <div class="back-notice-row">
            <div class="back-icon" style="background:transparent">${ICON_NOTICE}</div>
            <div class="back-text">
              <div class="back-label lbl-notice">What you might notice</div>
              <div class="back-desc">${card.notice}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}
function render(){
  const c=document.getElementById('carousel');
  const start=Math.max(0,cur-2),end=Math.min(deck.length-1,cur+2);
  let html='';
  for(let i=start;i<=end;i++)html+=makeCard(deck[i],i);
  c.innerHTML=html;
  document.getElementById('counter').textContent=`Card ${cur+1} of ${deck.length}`;
  document.getElementById('prog').style.width=`${((cur+1)/deck.length)*100}%`;
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===deck.length-1;
}
function clickSlot(i){
  if(i===cur)flipCard(i);
  else if(i===cur-1)move(-1);
  else if(i===cur+1)move(1);
}
function flipCard(i){
  if(flippedSet.has(i))flippedSet.delete(i);else flippedSet.add(i);
  const el=document.getElementById('inner-'+i);
  if(el)el.classList.toggle('flipped',flippedSet.has(i));
}
function flipCurrent(){flipCard(cur);}
function move(dir){
  const next=cur+dir;
  if(next<0||next>=deck.length)return;
  cur=next;render();
}
function buildCats(){
  const cats=["All",...Object.keys(ICONS)];
  document.getElementById('cats').innerHTML=cats.map(c=>
    `<button class="cat${c==='All'?' active':''}" data-c="${c}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(cat){
  activeCat=cat;
  document.querySelectorAll('.cat').forEach(b=>b.classList.toggle('active',b.dataset.c===cat));
  buildDeck();
}
buildCats();buildDeck();
</script>
</body>
</html>
